name: CI

# Definiujemy, kiedy ma się uruchomić ten proces
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # 1. Pobranie kodu repozytorium na maszynę wirtualną
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Konfiguracja środowiska Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-node: "20" # możesz zmienić na wersję, której używasz
          cache: "npm"

      # 3. Instalacja paczek (bez tego komendy npm run wywalą błąd "command not found")
      - name: Install dependencies
        run: npm ci

      # 4. Uruchomienie Twoich skryptów weryfikacyjnych
      - name: Run Lint
        run: npm run lint

      # Używamy "|", aby uruchomić kilka komend w jednym kroku jedna po drugiej
      - name: Run Format Check, Typecheck and Build
        run: |
          npm run format:check
          npm run typecheck
          npm run build
